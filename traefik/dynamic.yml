tls:
  certificates:
    - certFile: "/etc/letsencrypt/live/thedemo.fischbowl.tech/fullchain.pem"
      keyFile: "/etc/letsencrypt/live/thedemo.fischbowl.tech/privkey.pem"

http:
  routers:
    api:
      #rule: "(Host(`thedemo.fischbowl.tech`) || Host(`13.58.27.23`) || Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/api`)"
      rule: "Host(`thedemo.fischbowl.tech`) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      tls: {}
      service: django-api
      priority: 100

    frontend:
      #rule: "Host(`thedemo.fischbowl.tech`) || Host(`13.58.27.23`) || Host(`localhost`) || Host(`127.0.0.1`)"
      rule: "Host(`thedemo.fischbowl.tech`)"
      entryPoints:
        - websecure
      tls: {}
      service: frontend-static
      priority: 1

  services:
    django-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8000"

    frontend-static:
      loadBalancer:
        servers:
          - url: "http://web-app-deployment-tool-frontend-1:80"

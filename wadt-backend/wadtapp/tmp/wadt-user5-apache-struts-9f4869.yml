services:
  attacker:
    command: bash -c 'apt-get update && apt-get install -y nmap curl iputils-ping
      && curl -L https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.aarch64
      -o /usr/local/bin/ttyd && chmod +x /usr/local/bin/ttyd && ttyd -W bash'
    image: kalilinux/kali-rolling:latest
    labels:
      traefik.docker.network: wadt-user5-apache-struts-9f4869_default
      traefik.enable: 'true'
      traefik.http.routers.wadt-user5-apache-struts-9f4869-terminal.entrypoints: web
      traefik.http.routers.wadt-user5-apache-struts-9f4869-terminal.rule: Host(`terminal.wadt-user5-apache-struts-9f4869.localhost`)
      traefik.http.services.wadt-user5-apache-struts-9f4869-terminal.loadbalancer.server.port: '7681'
    networks:
    - default
  web:
    image: piesecurity/apache-struts2-cve-2017-5638
    labels:
      traefik.docker.network: wadt-user5-apache-struts-9f4869_default
      traefik.enable: 'true'
      traefik.http.routers.wadt-user5-apache-struts-9f4869.entrypoints: web
      traefik.http.routers.wadt-user5-apache-struts-9f4869.rule: Host(`wadt-user5-apache-struts-9f4869.localhost`)
      traefik.http.services.wadt-user5-apache-struts-9f4869.loadbalancer.server.port: '8080'
      wadt.user_id: '5'
    networks:
    - default

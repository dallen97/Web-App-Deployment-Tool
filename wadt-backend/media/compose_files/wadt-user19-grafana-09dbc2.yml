services:
  attacker:
    command: ttyd -W bash
    image: wadt-attacker:latest
    labels:
      traefik.docker.network: wadt-user19-grafana-09dbc2_default
      traefik.enable: 'true'
      traefik.http.routers.wadt-user19-grafana-09dbc2-terminal.entrypoints: web
      traefik.http.routers.wadt-user19-grafana-09dbc2-terminal.rule: Host(`terminal.wadt-user19-grafana-09dbc2.thedemo.fischbowl.tech`)
      traefik.http.services.wadt-user19-grafana-09dbc2-terminal.loadbalancer.server.port: '7681'
    networks:
    - default
  web:
    image: grafana/grafana:8.3.0
    labels:
      traefik.docker.network: wadt-user19-grafana-09dbc2_default
      traefik.enable: 'true'
      traefik.http.routers.wadt-user19-grafana-09dbc2.entrypoints: web
      traefik.http.routers.wadt-user19-grafana-09dbc2.rule: Host(`wadt-user19-grafana-09dbc2.thedemo.fischbowl.tech`)
      traefik.http.services.wadt-user19-grafana-09dbc2.loadbalancer.server.port: '3000'
      wadt.user_id: '19'
    networks:
    - default
